<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZeroJury</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <p class="eyebrow">Powered by 0G Compute</p>
    <h1>Ask once. See where AI jurors agree — and where they don’t.</h1>

    <form id="jury-form">
      <label for="question">Decision or question</label>
      <textarea
        id="question"
        minlength="10"
        required
        placeholder="Should our company launch before the external security audit?"
      ></textarea>
      <button type="submit">Analyze with ZeroJury</button>
    </form>

    <section id="result" aria-live="polite"></section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
